name: Feature request
description: Suggest an idea for this project
labels: ["needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please only use this template for submitting enhancement requests.

  - type: textarea
    id: what
    attributes:
      label: What would you like to be added?
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why is this needed?
    validations:
      required: true
