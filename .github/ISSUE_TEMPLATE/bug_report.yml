name: Bug Report
description: Report a bug you encountered
labels: ["kind/bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide as much info as possible. Not doing so may result in
        your bug not being addressed in a timely manner. Thanks!

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce it (as minimally and precisely as possible)
    validations:
      required: true

  - type: textarea
    id: anything-else
    attributes:
      label: Anything else we need to know?
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - Kubernetes version (use `kubectl version`):
        - llm-d-inference-sim version (use `git describe --tags --dirty --always` if you built from source, or specify the tag if you used a tagged version or image):
        - Cloud provider or hardware configuration:
        - Install tools:
        - Others:
    validations:
      required: false
